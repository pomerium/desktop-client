on:
  release:
    types:
      - published

jobs:
  notify-tap:
    runs-on: ubuntu-latest

    steps:
      - id: get_latest
        uses: rez0n/actions-github-release@05fabbd6b2b3ce3383299555ea518faea69b736d
        with:
          repository: ${{ github.repository }}
          type: 'stable'

      - id: clean_versions
        run: |
          echo "release=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "latest_release=${LATEST_VERSION#v}" >> $GITHUB_OUTPUT
        env:
          VERSION: '${{ github.event.release.tag_name }}'
          LATEST_VERSION: '${{ steps.get_latest.outputs.release }}'

      - name: Update homebrew tap
        if: steps.clean_versions.outputs.release == steps.clean_versions.outputs.latest_release
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          repository: pomerium/homebrew-tap
          token: ${{ secrets.APPARITOR_GITHUB_TOKEN }}
          event-type: desktop-client-release
          client-payload: '{ "version": "${{ steps.clean_versions.outputs.release }}" }'
