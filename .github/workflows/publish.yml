name: Publish

on:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
      issues: read
      pull-requests: read
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .tool-versions

      - name: Install npm 11.12.1 (npm 10 ignores min-release-age)
        run: |
          npm_dir="$(npm root -g)/npm"
          rm -rf "$npm_dir"
          mkdir -p "$npm_dir"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-11.12.1.tgz" | tar xz --strip-components=1 -C "$npm_dir"
      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: |
          npm ci

      - name: Import Apple CSC
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a
        with:
          p12-file-base64: ${{ secrets.APPLE_APP_CSC }}
          p12-password: ${{ secrets.APPLE_APP_CSC_PASSWORD }}

      - name: Set up Apple ID Credentials
        run: |
          mkdir ~/private_keys
          key_path=~/private_keys/AuthKey_${{ secrets.APPLE_ID }}.p8
          echo "${{ secrets.APPLE_ID_KEY }}" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_KEY_ISSUER: ${{ secrets.APPLE_ID_KEY_ISSUER }}
        run: |
          npm run release -- -m --arm64
          npm run release -- -m --x64
          npm run release -- -l --arm64
          npm run release -- -l --x64
          npm run release -- -w --x64
